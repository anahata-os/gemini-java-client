name: Build Standalone Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Get Project Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: Prepare jpackage Input
        shell: bash
        run: |
          mkdir -p package-input/libs
          # Copy the standard JAR (not the uber one) for jpackage bundling
          cp target/gemini-java-client-${{ env.VERSION }}.jar package-input/
          # Copy all runtime dependencies to the libs folder
          mvn dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=package-input/libs

      - name: Package Native App (jpackage)
        shell: bash
        run: |
          jpackage --name "Anahata-v1" \
                   --app-version "${{ env.VERSION }}" \
                   --input package-input \
                   --main-jar "gemini-java-client-${{ env.VERSION }}.jar" \
                   --main-class uno.anahata.ai.swing.Main \
                   --type app-image \
                   --dest dist \
                   --verbose
          
          # Zip/Tar the result for distribution
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            7z a "Anahata-v1-${{ env.VERSION }}-windows.zip" "./dist/Anahata-v1"
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            cd dist && zip -r "../Anahata-v1-${{ env.VERSION }}-macos.zip" "Anahata-v1.app" && cd ..
          else
            tar -czf "Anahata-v1-${{ env.VERSION }}-linux.tar.gz" -C dist "Anahata-v1"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.os }}
          path: |
            Anahata-v1-*.zip
            Anahata-v1-*.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: bin-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-artifacts/Anahata-v1-*.zip
            all-artifacts/Anahata-v1-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
